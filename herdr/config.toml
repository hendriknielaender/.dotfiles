# herdr configuration
# Keybindings ported from ~/.tmux.conf
[keys]
# tmux: set -g prefix C-s
prefix = "ctrl+s"

# tmux: christoomey/vim-tmux-navigator — move between panes with ctrl+h/j/k/l,
# no prefix needed. (tmux also had prefix h/j/k/l via bind-key select-pane.)
focus_pane_left = "ctrl+h"
focus_pane_down = "ctrl+j"
focus_pane_up = "ctrl+k"
focus_pane_right = "ctrl+l"

# tmux: bind % split-window -h  (side-by-side panes, vertical divider)
split_vertical = "prefix+%"
# tmux: bind '"' split-window -v  (stacked panes, horizontal divider)
split_horizontal = 'prefix+"'
# tmux: bind c new-window
new_tab = "prefix+c"

# Notes on non-binding tmux settings (already herdr defaults, no config needed):
#   set -g mouse on                -> [ui] mouse_capture = true (default)
#   set-window-option mode-keys vi -> navigate mode uses h/j/k/l by default
